apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __APP_NAME__
  namespace: __NAMESPACE__
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - http:
        paths:
          - path: __APP_BASE_PATH__
            pathType: Prefix
            backend:
              service:
                name: __APP_NAME__
                port:
                  number: 80
