spring.application.name=hello-spring
server.servlet.context-path=${APP_BASE_PATH:/apps}
spring.thymeleaf.cache=false

# Contact email delivery
# Use a Gmail App Password, not the normal account password.
# Example environment variables:
# MAIL_HOST=smtp.gmail.com
# MAIL_PORT=587
# MAIL_USERNAME=your-gmail@gmail.com
# MAIL_PASSWORD=your-16-character-app-password
# APP_CONTACT_MAIL_FROM=your-gmail@gmail.com
# APP_CONTACT_MAIL_TO=alejo.valenciarivera@gmail.com
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.contact.mail.from=${APP_CONTACT_MAIL_FROM:${spring.mail.username:}}
app.contact.mail.to=${APP_CONTACT_MAIL_TO:alejo.valenciarivera@gmail.com}
