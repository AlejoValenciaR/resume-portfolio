<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | Atlas Grove'">Atlas Grove</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/brand.css}">
</head>
<body>
    <header class="brand-header" th:fragment="header(currentPath)">
        <div class="brand-shell">
            <a class="brand-logo" th:href="@{/}">Atlas Grove</a>
            <nav class="brand-nav">
                <a th:href="@{/}" th:classappend="${currentPath == '/'} ? ' is-active' : ''">Home</a>
                <a th:href="@{/api/hello}" th:classappend="${currentPath == '/api/hello'} ? ' is-active' : ''">Hello</a>
                <a th:href="@{/api/users}" th:classappend="${currentPath == '/api/users' or #strings.startsWith(currentPath, '/api/users/')} ? ' is-active' : ''">Users</a>
            </nav>
        </div>
    </header>

    <footer class="brand-footer" th:fragment="footer">
        <div class="brand-shell">
            <p>Atlas Grove Platform</p>
        </div>
    </footer>
</body>
</html>
