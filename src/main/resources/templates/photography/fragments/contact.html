<article class="content contact gray-bg" id="chaptercontact" th:fragment="content">

            </div>

                                <div class="col-2 icon-block address"><i class="fa fa-map-marker"></i></div>
                                <div class="flot-left">
                                    <strong>Soulframe Studio</strong><br /> 
                                    Alejandro Valencia
                                    Cali, Colombia<br /> 
                                    
                                </div>
                            </div>
                            <div class="contact-text">
                                <div class="col-2 icon-block email"><i class="fa fa-envelope"></i></div>
                                <div class="flot-left">
                                    <strong>Email</strong><br />
                                    <a href="mailto:alejo.valenciarivera@gmail.com">alejo.valenciarivera@gmail.com</a>
                                </div>
                            </div>
                        </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

</article>
