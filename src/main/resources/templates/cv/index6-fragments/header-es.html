<th:block th:fragment="content">
<!--=====HEADER START=======-->
<style>
  .cv-language-switch {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-right: 16px;
  }

  .cv-language-option {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-width: 88px;
    padding: 8px 10px;
    border: 1px solid rgba(255, 255, 255, 0.28);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    color: #ffffff;
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1;
    text-decoration: none;
    transition: all 0.25s ease;
  }

  .cv-language-option:hover,
  .cv-language-option.is-active {
    border-color: #f6ad19;
    background: rgba(246, 173, 25, 0.18);
    color: #ffffff;
  }

  .cv-language-flag {
    display: block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex: 0 0 18px;
    object-fit: cover;
  }

  .cv-language-label {
    letter-spacing: 0.01em;
  }

  @media (max-width: 991px) {
    .cv-language-switch {
      margin-right: 10px;
    }

    .cv-language-option {
      min-width: 76px;
      padding: 7px 9px;
      font-size: 0.75rem;
    }
  }
</style>

<header>

    <div class="header-area homepage1 header header-sticky " id="header">

      <div class="container">

        <div class="row">

          <div class="col-lg-12">

            <div class="header-elements">

              <div class="site-logo">

                <a th:href="@{/portfolio/alejandro(lang='es')}" href="/portfolio/alejandro?lang=es"><img th:src="@{/ovro-index6-full/assets/img/logo/logo4.png}" src="/ovro-index6-full/assets/img/logo/logo4.png" alt=""></a>

              </div>

              <div class="btn-area d-lg-flex">

                <div class="theme-toggle-container cv-language-switch" role="group" aria-label="Seleccionar idioma">
                  <a class="cv-language-option" th:href="@{/portfolio/alejandro(lang='en')}" href="/portfolio/alejandro?lang=en">
                    <img class="cv-language-flag" th:src="@{/ovro-index6-full/assets/img/flags/us-circle.svg}" src="/ovro-index6-full/assets/img/flags/us-circle.svg" alt="United States flag">
                    <span class="cv-language-label">English</span>
                  </a>
                  <a class="cv-language-option is-active" th:href="@{/portfolio/alejandro(lang='es')}" href="/portfolio/alejandro?lang=es">
                    <img class="cv-language-flag" th:src="@{/ovro-index6-full/assets/img/flags/colombia-circle.svg}" src="/ovro-index6-full/assets/img/flags/colombia-circle.svg" alt="Colombia flag">
                    <span class="cv-language-label">Spanish</span>
                  </a>
               </div>

                <a href="#list-item-8" class="vl-btn1">CONTÁCTAME <span><img th:src="@{/ovro-index6-full/assets/img/icons/mail1.svg}" src="/ovro-index6-full/assets/img/icons/mail1.svg" alt=""></span></a>

                <button class="hamburger_menu"><img th:src="@{/ovro-index6-full/assets/img/icons/bars-icons1.svg}" src="/ovro-index6-full/assets/img/icons/bars-icons1.svg" alt=""></button>

              </div>

            </div>

          </div>

        </div>

      </div>

</div>

</header>

<!--=====HEADER END =======-->
</th:block>
