<th:block th:fragment="content">
<!--=====HEADER START=======-->
<style>
  .cv-language-switch {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-right: 16px;
    flex-wrap: nowrap;
  }

  .cv-language-option {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-width: 88px;
    padding: 8px 10px;
    border: 1px solid rgba(255, 255, 255, 0.28);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    color: #ffffff;
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1;
    text-decoration: none;
    transition: all 0.25s ease;
  }

  .cv-language-option:hover,
  .cv-language-option.is-active {
    border-color: #f6ad19;
    background: rgba(246, 173, 25, 0.18);
    color: #ffffff;
  }

  .cv-language-flag {
    display: block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    flex: 0 0 18px;
    object-fit: cover;
  }

  .cv-language-label {
    letter-spacing: 0.01em;
  }

  .cv-language-code {
    display: none;
    letter-spacing: 0.08em;
  }

  .hamburger_menu {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 46px;
    border: 1px solid rgba(255, 255, 255, 0.22) !important;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.08) !important;
    flex: 0 0 auto;
  }

  .hamburger_menu img {
    display: block;
    width: 22px;
    height: 22px;
  }

  @media (max-width: 991px) {
    .header-area.homepage1 .header-elements {
      gap: 12px;
    }

    .header-area.homepage1 .header-elements .site-logo {
      flex: 0 1 auto;
      min-width: 0;
    }

    .header-area.homepage1 .header-elements .site-logo img {
      width: clamp(104px, 26vw, 124px);
      height: auto;
    }

    .header-area.homepage1 .header-elements .btn-area {
      margin-left: auto;
      gap: 10px;
      flex: 0 0 auto;
    }

    .header-area.homepage1 .header-elements .btn-area .vl-btn1 {
      display: none;
    }

    .cv-language-switch {
      margin-right: 0;
      gap: 6px;
    }

    .cv-language-option {
      min-width: 0;
      padding: 7px 8px;
      gap: 5px;
      font-size: 0.74rem;
    }

    .cv-language-flag {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .cv-language-label {
      display: none;
    }

    .cv-language-code {
      display: inline;
    }

    .hamburger_menu {
      width: 50px;
      height: 50px;
    }

    .hamburger_menu img {
      width: 24px;
      height: 24px;
    }
  }

  @media (max-width: 575px) {
    .header-area.homepage1 .header-elements {
      gap: 10px;
    }

    .header-area.homepage1 .header-elements .btn-area {
      gap: 8px;
    }

    .cv-language-switch {
      gap: 4px;
    }

    .cv-language-option {
      padding: 6px 7px;
      border-radius: 14px;
    }

    .cv-language-code {
      font-size: 0.7rem;
    }

    .hamburger_menu {
      width: 46px;
      height: 46px;
      border-radius: 14px;
    }
  }
</style>

<header>

    <div class="header-area homepage1 header header-sticky " id="header">

      <div class="container">

        <div class="row">

          <div class="col-lg-12">

            <div class="header-elements">

              <div class="site-logo">

                <a th:href="@{/developer(lang='en')}" href="/developer?lang=en"><img th:src="@{/ovro-index6-full/assets/img/logo/logo4.png}" src="/ovro-index6-full/assets/img/logo/logo4.png" alt=""></a>

              </div>

              <div class="btn-area d-lg-flex">

                <div class="theme-toggle-container cv-language-switch" role="group" aria-label="Select language">
                  <a class="cv-language-option is-active" th:href="@{/developer(lang='en')}" href="/developer?lang=en">
                    <img class="cv-language-flag" th:src="@{/ovro-index6-full/assets/img/flags/us-circle.svg}" src="/ovro-index6-full/assets/img/flags/us-circle.svg" alt="United States flag">
                    <span class="cv-language-label">English</span>
                    <span class="cv-language-code" aria-hidden="true">EN</span>
                  </a>
                  <a class="cv-language-option" th:href="@{/developer(lang='es')}" href="/developer?lang=es">
                    <img class="cv-language-flag" th:src="@{/ovro-index6-full/assets/img/flags/colombia-circle.svg}" src="/ovro-index6-full/assets/img/flags/colombia-circle.svg" alt="Colombia flag">
                    <span class="cv-language-label">Spanish</span>
                    <span class="cv-language-code" aria-hidden="true">ES</span>
                  </a>
               </div>

                <a href="#list-item-8" class="vl-btn1">REACH ME OUT <span><img th:src="@{/ovro-index6-full/assets/img/icons/mail1.svg}" src="/ovro-index6-full/assets/img/icons/mail1.svg" alt=""></span></a>

                <button class="hamburger_menu"><img th:src="@{/ovro-index6-full/assets/img/icons/bars-icons1.svg}" src="/ovro-index6-full/assets/img/icons/bars-icons1.svg" alt=""></button>

              </div>

            </div>

          </div>

        </div>

      </div>

</div>

</header>

<!--=====HEADER END =======-->
</th:block>
