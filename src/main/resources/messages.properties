hero.summary=More than 7 years of experience building robust systems with Java and Python, focused on clean architecture, APIs, integrations, and scalable cloud-ready solutions; implementing enterprise environments with Docker, Kubernates or Event Streaming Managers. I have led end-to-end backend initiatives designing secure and high-availability solutions, using technologies such as Terraform, CI/CD with Jenkins, cloud services on AWS, Azure or GCP, and large-scale migration tools.
