portfolio.project1.title=Terraform Jenkins on DigitalOcean
portfolio.project1.summary=This Infrastructure as Code project provisions a Jenkins server on DigitalOcean with Terraform, persistent storage, DNS, firewall rules, Docker, and Nginx, creating a compact self-hosted CI/CD environment exposed securely over HTTPS.
portfolio.project1.imageAlt=Terraform Jenkins DigitalOcean project
portfolio.project2.title=Azure VM Terraform + LocalStack
portfolio.project2.summary=This Terraform and Jenkins setup provisions an Azure environment with networking, DNS, persistent storage, Docker, Nginx, a static website, and LocalStack behind custom domains with TLS for repeatable single-server automation.
portfolio.project2.imageAlt=Azure LocalStack Terraform project
portfolio.project3.title=LocalStack AWS Automation Lab
portfolio.project3.summary=This Jenkins-based automation lab deploys AWS-like resources into LocalStack with Terraform or AWS CLI, handling preflight checks, credentials, deployment artifacts, and optional Azure-backed Terraform state from one pipeline.
portfolio.project3.imageAlt=LocalStack AWS automation project
portfolio.project4.title=Spring Boot Multi-App Platform
portfolio.project4.summary=This Spring Boot project centralizes and serves multiple web applications from a single backend, organizing routing, templates, static assets, and shared presentation logic to expose portfolio-style app experiences from one platform.
portfolio.project4.imageAlt=Spring Boot multi-app platform project
