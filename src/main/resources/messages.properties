about.aboutMeTitle=About me
about.paragraph1=Hi, I am Alejandro Valencia, a Senior Backend Developer and Tech lead with more than 7 years of experience leading and delivering strategic projects in enterprise environments. I specialize in designing and implementing scalable, secure, and high-performance backend solutions using Java and Python, with frameworks like Spring, Hibernate, Jakarta EE, Flask, FastAPI and Django.
about.paragraph2=Following best standards, patterns, architectures, testing practices, and quality assurance, I am able to release great software that meets real company needs. I have led large-scale, critical migrations and modernization efforts, certified as a Scrum Master and Product Owner.
about.paragraph3=AWS, Azure, GCP, Terraform (IaC), Jenkins, Git, Docker, Kubernates, Event Streaming, and many other technologies have become my everyday tools to achieve major goals, which has given me strong mastery and expertise, not only in the tools themselves, but also in solving real-world business problems.
about.paragraph4=I incorporate LLMs and prompt engineering into my workflows to accelerate technical analysis, documentation, and the generation of common software artifacts while maintaining an unwavering focus on quality, security, and traceability.
about.card1.title=Java and Python
about.card1.copy=Senior developer with experience in frameworks like Spring, Hibernate, Jakarta EE, Flask, FastAPI and Django.
about.card2.title=Quality Assurance
about.card2.copy=Ensuring software quality through comprehensive testing, code reviews, and adherence to best practices.
about.card3.title=Design Patterns and Principles
about.card3.copy=SOLID principles, Patterns like Factory, Singleton, and Observer, all this standards were making to ensure code quality and maintainability, that is the type of work that I enjoy the most in my career.
about.card4.title=REST and SOAP APIs
about.card4.copy=Nowdays, I specialize in designing and implementing RESTful and SOAP APIs, ensuring seamless integration and optimal performance, Guarantees the best user experience and microservices architecture
