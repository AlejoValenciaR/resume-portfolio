about.experience1.summary=Led and contributed to high-impact projects across cloud architecture, CRM integration, database modernization, and payment platform optimization.
about.experience1.bullet1=<strong>Salesforce Marketing Cloud:</strong> Designed the full architecture, diagrams, technical designs, and implementation modules using AWS, Azure, Terraform, Git, Jenkins, Splunk, Java, and Python, increasing campaign success rates by <strong>45%</strong> and profitability by <strong>25%</strong>.
about.experience1.bullet2=<strong>MongoDB to Amazon DocumentDB migration:</strong> Built large-scale data validation tooling, modernized infrastructure, migrated APIs to Node.js, Java, and Python, and refactored hundreds of queries, reducing database costs by nearly <strong>$15,000 per month</strong>.
about.experience1.bullet3=<strong>Core payment services optimization:</strong> Removed bottlenecks, reduced front-end response times, and improved query and transaction speed by <strong>60%</strong>.
about.experience1.bullet4=<strong>New API delivery:</strong> Built a FastAPI integration API for Salesforce and a Java Spring Boot API for Ascent.
about.experience2.role=Software and Architecture Consultant
about.experience2.chip1=Java Migration
about.experience2.chip2=API Rest
about.experience2.chip3=Database Optimization
about.experience2.chip4=React Development
about.experience2.summary=Developed backend and database modernization solutions for the Ministry of Transport (Colombia), using Java, Jakarta EE, and Oracle on-premises infrastructure.
about.experience2.bullet1=<strong>Java 8 to Java 21 migration:</strong> Migrated the traffic fines <strong>payment module from Java 8 to Java 21</strong> and developed technical documentation and a new REST API to support future payment processing modules.
about.experience2.bullet2=<strong>Performance improvement:</strong> Improved Oracle 13c database query performance <strong>by 40%</strong> in the payments and reporting modules and standardized database connectivity through the development of a new shared module.
about.experience2.bullet3=<strong>New React Admin panel:</strong> Developed the React frontend for the user management and traffic fines inquiry/payment modules, <strong>implementing session management, caching, Redis integration, encryption, and secure authentication</strong>
about.experience3.role=Backend JAVA/Python Software Engineer, Senior
about.experience3.chip1=DDD and Test Automation
about.experience3.chip2=API Rest
about.experience3.chip3=Python Development
about.experience3.chip4=Java Development
about.experience3.summary=Made significant contributions to the development of backend systems and APIs on AWS and Azure Architectures, allowing the company to deliver a new mobile app on Android for new Banking products.
about.experience3.bullet1=<strong>New mobile app development:</strong> Participated in the development of a new mobile app for banking products, following <strong>Domain Driven Design principles</strong> and Python frameworks like <strong>FastAPI, Django and Flask</strong> supporting it on <strong>Pydantic</strong> and <strong>pytest</strong> over AWS and Azure cloud platforms.
about.experience3.bullet2=<strong>Microservices and domain modeling:</strong> Designed and implemented domain models and business logic across multiple microservices using <strong>Python and Java</strong>, applying <strong>Domain-Driven Design (DDD)</strong> principles to support scalable banking services for microloans and low-balance account management.
about.experience3.bullet3=<strong>Cloud-native backend services:</strong> Developed and deployed RESTful backend services within <strong>AWS, Azure, and GCP</strong> environments, integrating API Gateway patterns, SQL and NoSQL databases, and CI/CD pipelines to support high-throughput financial transactions and reporting systems.
about.experience4.role=Tech lead and Senior Developer Analyst,
about.experience4.chip1=Core Banking
about.experience4.chip2=API Gateway
about.experience4.chip3=AWS
about.experience4.chip4=REST & SOAP
about.experience4.chip5=ETL Modernization
about.experience4.chip6=Azure
about.experience4.chip7=Banking Systems
about.experience4.summary=Led a strategic technology and compliance program to enable Banco Unión to obtain an official banking operating license and deploy a new Core Banking platform, modernizing the integration and data ecosystem across the organization.
about.experience4.bullet1=<strong>Core banking integration architecture:</strong> Designed and implemented the inter-application communication backbone by building an <strong>API Gateway and mediation layer</strong> with <strong>94+ REST and SOAP services</strong>, plus a translation API to integrate legacy banking systems with modern platforms.
about.experience4.bullet2=<strong>Enterprise data modernization:</strong> Cataloged and standardized <strong>130+ ETL jobs and reporting pipelines</strong>, and contributed to their migration to modern data platforms including <strong>AWS Glue, Azure Data Factory, and GoAnywhere</strong>.
about.experience4.bullet3=<strong>Regulatory and operational readiness:</strong> Produced technical standards, operating manuals, and integration documentation required to meet <strong>banking regulatory and audit requirements</strong>, supporting the successful rollout of the institution new Core Banking ecosystem.
about.experience5.role=Developer Analyst and FLEXCUBE Migration Lead
about.experience5.chip1=Oracle FLEXCUBE
about.experience5.chip2=Core Banking Migration
about.experience5.chip3=Technical Leadership
about.experience5.chip4=ETL & DataStage
about.experience5.chip5=Python & Java
about.experience5.chip6=Flask & Django
about.experience5.chip7=ODS & Reporting
about.experience5.summary=Played a key role in the modernization of banking products and data processes, leading the technical design and migration strategy for active loan portfolio products into Oracle FLEXCUBE while improving reporting, ETL performance, and production decision-making across multiple business units.
about.experience5.bullet1=<strong>FLEXCUBE migration leadership:</strong> Designed the end-to-end technology architecture and migration rules for the transition of active loan portfolio products into <strong>Oracle FLEXCUBE</strong>, while serving as a <strong>Production Solutions Consultant</strong> and leading an <strong>11-person team</strong> through delivery.
about.experience5.bullet2=<strong>High-impact banking migration:</strong> Contributed to the successful migration of <strong>Revolving Credit and Personal Loan products</strong>, achieving a <strong>99.8% success rate</strong> across <strong>39,000 customers and 80,000 loans</strong>, enabling a reliable transition to the bank new core banking model.
about.experience5.bullet3=<strong>Data and operational optimization:</strong> Built <strong>15 ETL pipelines</strong> using <strong>DataStage</strong>, optimized <strong>5 production ETL processes</strong> involved in loan portfolio closing, reducing execution time by <strong>1.5 hours</strong>, and improved <strong>ODS and FLEXCUBE queries</strong> to strengthen reporting and business decision-making.
about.highlightedProjects=Highlighted Projects
about.project1.title=Salesforce Marketing Cloud
about.project1.summary=The objective of this project was to integrate Salesforce Marketing Cloud, which was an external infrastructure, with the company internal AWS infrastructure. To achieve this, it was necessary to design from scratch a new API Gateway and an SFTP server to enable secure information exchange between both architectures. It was a project that required nearly six months of continuous development.
about.project2.title=Data Base Migration
about.project2.summary=This project involved migrating the company on-premises MongoDB database to Amazon DocumentDB. <br><br>The initiative required much more than simply moving the database engine and data. Because MongoDB and DocumentDB differ in query support and feature compatibility, approximately 400 database queries used to create, update, delete, and retrieve data had to be migrated across 130 application components. As part of this effort, about 70% of the components were migrated to Node.js, while the remaining 30% were optimized within Spring Boot services. <br><br>My most significant contributions to this project included developing modules that enabled accurate data translation, casting, and conversion between the legacy and new platforms without metadata loss. I standardized this library across the company to support the migration effort at scale. I also trained multiple teams on how to write efficient pointer-based queries and served as the primary author of most of the Node.js code. In addition, I developed Python scripts that automated the large-scale deployment of the architecture. These automations improved team efficiency by 70%, allowing teams to focus primarily on migration execution and data quality while I handled the architectural deployment layer end to end. <br><br>In addition, I was responsible for designing from scratch a data encryption model for the new reporting and monitoring platform in order to prevent sensitive information from being exposed to unauthorized third parties. Beyond that, I independently designed and developed the full architecture and software solution required to extract data from the production database and generate encrypted copies for downstream systems. This process had to run daily and complete in under one hour.
about.project3.title=Wompi Payments
about.project3.summary=I was one of the lead developers on the team responsible for implementing the Colombian payment gateway Wompi for the company. The goal was to enable the business to accept multiple payment methods, support subscriptions, and extend these payment capabilities to third parties involved in internal debt collection contracts. In other words, it allowed third parties to collect debt through the company using Wompi as the payment intermediary. <br><br>I proposed major architectural improvements to make the solution more efficient, cost-effective, and simpler to maintain. In addition, as one of the team Terraform and cloud experts, I independently deployed the entire initial architecture to production, allowing the development team to focus exclusively on application code implementation. <br><br><strong>Technologies used: AWS API Gateway, AWS DocumentDB, AWS VPC, AWS IAM, AWS EventBridge, AWS Step Functions, AWS Glue, AWS Lambda, AWS EKS, AWS ECR, Java JDK 21, Python 3.5, Spring Boot, FastAPI, MongoDB, AWS SQS, AWS CloudWatch, AWS X-Ray, Dynatrace, AWS Kinesis, Splunk, AWS S3, AWS Systems Manager, AWS Secrets Manager, Azure Data Factory, Node.js, Jira, Git, Terraform, Docker, and Kubernetes.</strong>
about.project4.title=Traffic fines payment module
about.project4.summary=I led and developed the modernization of the traffic fines payment platform, upgrading the backend from Java 8 to a newer Java version, redesigning the front end in React.js, and implementing a new REST API in FastAPI. <br><br><strong>Technologies used: Java, Python, React.js, Node.js, PostgreSQL, AWS, Docker, and Kubernetes.</strong>
about.project5.title=Android APP BOLD CF
about.project5.summary=Using Kotlin, React, and Python with Pydantic and Pytest, within a Domain-Driven Design (DDD) and Scrum methodology, we successfully delivered the company first Android app prototype in just 3 to 4 months. This was made possible after we obtained government authorization to begin operating as a financing company, and the app enabled us to launch new financial products such as low-balance accounts and microloans. <br><br><strong>Technologies used: Java, Python, React.js, FastAPI, Domain-Driven Design (DDD), Scrum, Swagger, Pydantic, Pytest, AWS, Batch processing, Linux, and MongoDB.</strong>
about.project6.title=Core Banking System
about.project6.summary=I was responsible for leading a team of two QA engineers while serving as the technical lead and sole developer on the team to build a new API Gateway from scratch with more than 90 SOAP and REST services. This API Gateway became, and remains to this day, the company core banking system, as it enabled the bank to transition to a microservices-based architecture. Collectively, these services supported all of the bank transactional and monetary operations. <br><br>This was a key requirement for the company to operate legally as a bank in Colombia, which was made possible through the successful implementation of this new API Gateway. In addition, I led the optimization and migration of more than 130 ETL processes from Pentaho to GoAnywhere and AWS Glue. Reporting was designed in Power BI, and the migration required identifying and classifying the ETLs by business area, as well as optimizing more than 70 of them. The project as a whole was a success and enabled the company to begin operating as a bank under Colombian regulations. <br><br><strong>Technologies used: Java Spring Boot, Jakarta EE, Hibernate, Python Django, Flask, Pentaho, GoAnywhere, AWS, Azure, Power BI, SIIF, and DataStage.</strong>
about.project7.title=FLEXCUBE Migration Program
about.project7.summary=I served as the Technical Lead and Scrum Master for the migration team responsible for migrating two products, revolving credit and fixed-amount loans, originally hosted in a .NET application called SIIF. I was responsible for designing the full transaction and migration architecture between the legacy platforms and the new FLEXCUBE core banking system, as this was a large-scale strategic initiative to implement the new core banking. <br><br>Over several months, we conducted multiple migration rehearsals alongside the Oracle team to improve the success rate of the products being migrated. I designed the core algorithms that enabled accurate data translation from SISCAR and SIIF into FLEXCUBE, helping streamline the migration process. I also refined and created system rules to make the overall architecture increasingly viable and reliable. I led a team of 5 QA engineers, 4 developers, and 1 Product Owner. The project was a success: we migrated 99.85% of the total portfolio, exceeding the target of 95%. <br><br>Following this achievement, I joined the SAM unit for one year, where I was responsible for supporting FLEXCUBE and developing new features for other internal and external departments, using different frameworks. <br><br><strong>Technologies used: Java EE, Jakarta EE, Hibernate, Python 3.12, Django, DataStage, FLEXCUBE, Jenkins, SISCAR, PL/SQL, PostgreSQL, Oracle 11g, Pentaho, and Scrum.</strong>
