about.experience1.summary=Lideré y participé en proyectos de alto impacto relacionados con arquitectura cloud, integración CRM, modernización de bases de datos y optimización de plataformas de pagos.
about.experience1.bullet1=<strong>Salesforce Marketing Cloud:</strong> Diseñé la arquitectura completa, diagramas, diseños técnicos y módulos de implementación usando AWS, Azure, Terraform, Git, Jenkins, Splunk, Java y Python, incrementando la efectividad de campañas en <strong>45%</strong> y la rentabilidad en <strong>25%</strong>.
about.experience1.bullet2=<strong>Migración de MongoDB a Amazon DocumentDB:</strong> Construí herramientas de validación de datos a gran escala, modernicé infraestructura, migré APIs a Node.js, Java y Python, y refactoricé cientos de consultas, reduciendo costos de base de datos en cerca de <strong>USD 15.000 al mes</strong>.
about.experience1.bullet3=<strong>Optimización de servicios core de pagos:</strong> Eliminé cuellos de botella, reduje tiempos de respuesta del frontend y mejoré la velocidad de consultas y transacciones en <strong>60%</strong>.
about.experience1.bullet4=<strong>Entrega de nuevas APIs:</strong> Construí una API de integración en FastAPI para Salesforce y una API en Java Spring Boot para Ascent.
