portfolio.project1.title=Terraform Jenkins en DigitalOcean
portfolio.project1.summary=Este proyecto de infraestructura como código aprovisiona un servidor Jenkins en DigitalOcean con Terraform, almacenamiento persistente, DNS, reglas de firewall, Docker y Nginx, creando un entorno compacto de CI/CD autogestionado expuesto de forma segura por HTTPS.
portfolio.project1.imageAlt=Proyecto Terraform Jenkins en DigitalOcean
portfolio.project2.title=Azure VM Terraform + LocalStack
portfolio.project2.summary=Esta configuración con Terraform y Jenkins aprovisiona un entorno en Azure con red, DNS, almacenamiento persistente, Docker, Nginx, un sitio estático y LocalStack detrás de dominios personalizados con TLS para automatización repetible en un solo servidor.
portfolio.project2.imageAlt=Proyecto Azure LocalStack con Terraform
portfolio.project3.title=Laboratorio de automatización AWS con LocalStack
portfolio.project3.summary=Este laboratorio de automatización basado en Jenkins despliega recursos tipo AWS en LocalStack con Terraform o AWS CLI, manejando validaciones previas, credenciales, artefactos de despliegue y, opcionalmente, estado de Terraform respaldado en Azure desde un solo pipeline.
portfolio.project3.imageAlt=Proyecto de automatización AWS con LocalStack
portfolio.project4.title=Plataforma multiaplicación en Spring Boot
portfolio.project4.summary=Este proyecto en Spring Boot centraliza y sirve múltiples aplicaciones web desde un solo backend, organizando rutas, plantillas, recursos estáticos y lógica de presentación compartida para exponer experiencias tipo portafolio desde una sola plataforma.
