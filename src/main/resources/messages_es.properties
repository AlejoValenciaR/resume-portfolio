about.aboutMeTitle=Sobre mí
about.paragraph1=Hola, soy Alejandro Valencia, desarrollador backend senior y tech lead con más de 7 años de experiencia liderando y entregando proyectos estratégicos en entornos empresariales. Me especializo en diseñar e implementar soluciones backend escalables, seguras y de alto rendimiento usando Java y Python, con frameworks como Spring, Hibernate, Jakarta EE, Flask, FastAPI y Django.
about.paragraph2=Siguiendo estándares, patrones, arquitecturas, prácticas de pruebas y aseguramiento de calidad, puedo entregar software sólido que responde a necesidades reales de negocio. He liderado migraciones críticas y esfuerzos de modernización a gran escala, y cuento con certificaciones como Scrum Master y Product Owner.
about.paragraph3=AWS, Azure, GCP, Terraform (IaC), Jenkins, Git, Docker, Kubernetes, event streaming y muchas otras tecnologías hacen parte de mi día a día para alcanzar objetivos importantes. Esto me ha dado una gran experiencia no solo en las herramientas, sino también en la solución de problemas reales de negocio.
about.paragraph4=Incorporo LLMs e ingeniería de prompts en mis flujos de trabajo para acelerar análisis técnicos, documentación y generación de artefactos comunes de software, manteniendo siempre el foco en calidad, seguridad y trazabilidad.
about.card1.title=Java y Python
about.card1.copy=Desarrollador senior con experiencia en frameworks como Spring, Hibernate, Jakarta EE, Flask, FastAPI y Django.
about.card2.title=Aseguramiento de calidad
about.card2.copy=Asegurando la calidad del software mediante pruebas integrales, revisiones de código y seguimiento de buenas prácticas.
about.card3.title=Patrones y principios de diseño
about.card3.copy=Principios SOLID y patrones como Factory, Singleton y Observer hacen parte del tipo de ingeniería que más disfruto porque garantizan calidad, mantenibilidad y claridad en el código.
about.card4.title=APIs REST y SOAP
about.card4.copy=Hoy me especializo en diseñar e implementar APIs REST y SOAP, asegurando integraciones fluidas, alto desempeño y una base sólida para arquitecturas de microservicios.
