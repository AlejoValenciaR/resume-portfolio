hero.summary=Más de 7 años de experiencia construyendo sistemas robustos con Java y Python, enfocados en arquitectura limpia, APIs, integraciones y soluciones escalables listas para la nube; implementando entornos empresariales con Docker, Kubernetes o gestores de eventos. He liderado iniciativas backend de punta a punta, diseñando soluciones seguras y de alta disponibilidad, usando tecnologías como Terraform, CI/CD con Jenkins, servicios cloud en AWS, Azure o GCP, y herramientas de migración a gran escala.
