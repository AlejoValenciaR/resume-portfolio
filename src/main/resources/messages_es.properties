about.experience5.chip7=ODS y reportería
about.experience5.summary=Tuve un rol clave en la modernización de productos bancarios y procesos de datos, liderando el diseño técnico y la estrategia de migración de cartera activa hacia Oracle FLEXCUBE, mientras mejoraba reportería, desempeño ETL y toma de decisiones operativas.
about.experience5.bullet1=<strong>Liderazgo de migración FLEXCUBE:</strong> Diseñé la arquitectura tecnológica end-to-end y las reglas de migración para trasladar productos de cartera activa hacia <strong>Oracle FLEXCUBE</strong>, mientras me desempeñaba como <strong>consultor de soluciones productivas</strong> y lideraba un <strong>equipo de 11 personas</strong>.
about.experience5.bullet2=<strong>Migración bancaria de alto impacto:</strong> Contribuí a la migración exitosa de productos de <strong>crédito rotativo y préstamos personales</strong>, logrando una tasa de éxito de <strong>99,8%</strong> sobre <strong>39.000 clientes y 80.000 créditos</strong>, habilitando una transición confiable hacia el nuevo modelo core bancario del banco.
about.experience5.bullet3=<strong>Optimización operativa y de datos:</strong> Construí <strong>15 pipelines ETL</strong> usando <strong>DataStage</strong>, optimicé <strong>5 procesos ETL productivos</strong> involucrados en el cierre de cartera, reduciendo el tiempo de ejecución en <strong>1,5 horas</strong>, y mejoré consultas sobre <strong>ODS y FLEXCUBE</strong> para fortalecer reportería y toma de decisiones.
about.highlightedProjects=Proyectos destacados
about.project1.title=Integración Salesforce Marketing Cloud
about.project1.summary=El objetivo de este proyecto fue integrar Salesforce Marketing Cloud, una infraestructura externa, con la infraestructura interna de AWS de la compañía. Para lograrlo, fue necesario diseñar desde cero un nuevo API Gateway y un servidor SFTP que permitieran el intercambio seguro de información entre ambas arquitecturas. Fue un proyecto que requirió cerca de seis meses de desarrollo continuo.
about.project2.title=Migración de base de datos
about.project2.summary=Este proyecto consistió en migrar la base de datos MongoDB on-premises de la compañía hacia Amazon DocumentDB. <br><br>La iniciativa exigió mucho más que mover el motor y los datos. Debido a que MongoDB y DocumentDB difieren en soporte de consultas y compatibilidad de funcionalidades, fue necesario migrar cerca de 400 consultas de base de datos usadas para crear, actualizar, eliminar y consultar información en 130 componentes de aplicación. Como parte de este esfuerzo, cerca del 70% de los componentes se migraron a Node.js, mientras el 30% restante se optimizó dentro de servicios Spring Boot. <br><br>Mis contribuciones más importantes en este proyecto incluyeron el desarrollo de módulos que permitieron traducir, castear y convertir datos con precisión entre la plataforma legada y la nueva sin pérdida de metadatos. Estandaricé esta librería dentro de la compañía para soportar la migración a escala. También capacité a múltiples equipos sobre cómo escribir consultas eficientes basadas en punteros y fui el autor principal de buena parte del código en Node.js. Además, desarrollé scripts en Python que automatizaron el despliegue masivo de la arquitectura. Estas automatizaciones mejoraron la eficiencia de los equipos en un 70%, permitiéndoles enfocarse principalmente en la ejecución de la migración y la calidad de los datos mientras yo manejaba la capa de despliegue arquitectónico de principio a fin. <br><br>Adicionalmente, fui responsable de diseñar desde cero un modelo de cifrado para la nueva plataforma de reportería y monitoreo, con el fin de evitar la exposición de información sensible a terceros no autorizados. Más allá de eso, diseñé y desarrollé de manera independiente toda la arquitectura y solución de software necesarias para extraer datos de la base productiva y generar copias cifradas para sistemas downstream. Este proceso debía ejecutarse diariamente y completarse en menos de una hora.
about.project3.title=Pagos Wompi
about.project3.summary=Fui uno de los desarrolladores líderes del equipo responsable de implementar la pasarela de pagos colombiana Wompi para la compañía. El objetivo era permitir que el negocio aceptara múltiples métodos de pago, soportara suscripciones y extendiera estas capacidades de pago a terceros involucrados en contratos internos de cobranza. En otras palabras, permitió que terceros cobraran cartera a través de la compañía usando Wompi como intermediario de pago. <br><br>Propuse mejoras arquitectónicas importantes para hacer la solución más eficiente, económica y sencilla de mantener. Además, como uno de los referentes del equipo en Terraform y cloud, desplegué de manera independiente toda la arquitectura inicial a producción, permitiendo que el equipo de desarrollo se concentrara exclusivamente en la implementación del código aplicativo. <br><br><strong>Tecnologías usadas: AWS API Gateway, AWS DocumentDB, AWS VPC, AWS IAM, AWS EventBridge, AWS Step Functions, AWS Glue, AWS Lambda, AWS EKS, AWS ECR, Java JDK 21, Python 3.5, Spring Boot, FastAPI, MongoDB, AWS SQS, AWS CloudWatch, AWS X-Ray, Dynatrace, AWS Kinesis, Splunk, AWS S3, AWS Systems Manager, AWS Secrets Manager, Azure Data Factory, Node.js, Jira, Git, Terraform, Docker y Kubernetes.</strong>
about.project4.title=Módulo de pago de comparendos
about.project4.summary=Lideré y desarrollé la modernización de la plataforma de pago de comparendos, actualizando el backend de Java 8 a una versión más reciente de Java, rediseñando el frontend en React.js e implementando una nueva API REST en FastAPI. <br><br><strong>Tecnologías usadas: Java, Python, React.js, Node.js, PostgreSQL, AWS, Docker y Kubernetes.</strong>
about.project5.title=App Android BOLD CF
about.project5.summary=Usando Kotlin, React y Python con Pydantic y Pytest, dentro de una metodología Domain-Driven Design (DDD) y Scrum, logramos entregar el primer prototipo de aplicación Android de la compañía en solo 3 a 4 meses. Esto fue posible después de obtener la autorización gubernamental para comenzar a operar como compañía de financiamiento, y la app permitió lanzar nuevos productos financieros como cuentas de bajo monto y microcréditos. <br><br><strong>Tecnologías usadas: Java, Python, React.js, FastAPI, Domain-Driven Design (DDD), Scrum, Swagger, Pydantic, Pytest, AWS, procesamiento batch, Linux y MongoDB.</strong>
about.project6.title=Sistema Core Banking
about.project6.summary=Fui responsable de liderar un equipo de dos ingenieros QA mientras actuaba como líder técnico y único desarrollador del equipo para construir desde cero un nuevo API Gateway con más de 90 servicios SOAP y REST. Este API Gateway se convirtió, y aún hoy sigue siendo, el sistema core bancario de la compañía, ya que permitió la transición hacia una arquitectura basada en microservicios. En conjunto, estos servicios soportaban todas las operaciones transaccionales y monetarias del banco. <br><br>Este fue un requisito clave para que la compañía pudiera operar legalmente como banco en Colombia, lo cual fue posible gracias a la implementación exitosa de este nuevo API Gateway. Además, lideré la optimización y migración de más de 130 procesos ETL desde Pentaho hacia GoAnywhere y AWS Glue. La reportería se diseñó en Power BI, y la migración exigió identificar y clasificar los ETL por área de negocio, además de optimizar más de 70 de ellos. El proyecto en su conjunto fue un éxito y permitió que la compañía comenzara a operar como banco bajo la regulación colombiana. <br><br><strong>Tecnologías usadas: Java Spring Boot, Jakarta EE, Hibernate, Python Django, Flask, Pentaho, GoAnywhere, AWS, Azure, Power BI, SIIF y DataStage.</strong>
about.project7.title=Programa de migración FLEXCUBE
about.project7.summary=Me desempeñé como líder técnico y Scrum Master del equipo de migración responsable de trasladar dos productos, crédito rotativo y préstamos de monto fijo, originalmente alojados en una aplicación .NET llamada SIIF. Fui responsable de diseñar toda la arquitectura transaccional y de migración entre las plataformas legadas y el nuevo core bancario FLEXCUBE, ya que se trataba de una iniciativa estratégica de gran escala para implementar el nuevo core bancario. <br><br>Durante varios meses realizamos múltiples simulacros de migración junto con el equipo de Oracle para mejorar la tasa de éxito de los productos migrados. Diseñé los algoritmos centrales que permitieron traducir de manera precisa la información desde SISCAR y SIIF hacia FLEXCUBE, ayudando a agilizar el proceso. También afiné y creé reglas de sistema para hacer que la arquitectura fuera cada vez más viable y confiable. Lideré un equipo de 5 ingenieros QA, 4 desarrolladores y 1 Product Owner. El proyecto fue un éxito: migramos el 99,85% de la cartera total, superando la meta del 95%. <br><br>Después de este logro me integré durante un año a la unidad SAM, donde fui responsable de dar soporte a FLEXCUBE y desarrollar nuevas funcionalidades para otras áreas internas y externas, usando distintos frameworks. <br><br><strong>Tecnologías usadas: Java EE, Jakarta EE, Hibernate, Python 3.12, Django, DataStage, FLEXCUBE, Jenkins, SISCAR, PL/SQL, PostgreSQL, Oracle 11g, Pentaho y Scrum.</strong>
