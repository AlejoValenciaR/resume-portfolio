about.experience3.summary=Realicé aportes importantes al desarrollo de sistemas backend y APIs sobre arquitecturas AWS y Azure, permitiendo a la compañía entregar una nueva app móvil Android para productos bancarios.
about.experience3.bullet1=<strong>Desarrollo de nueva app móvil:</strong> Participé en el desarrollo de una nueva app móvil para productos bancarios, siguiendo principios de <strong>Domain Driven Design</strong> y frameworks Python como <strong>FastAPI, Django y Flask</strong>, soportados por <strong>Pydantic</strong> y <strong>pytest</strong> sobre plataformas cloud AWS y Azure.
about.experience3.bullet2=<strong>Microservicios y modelado de dominio:</strong> Diseñé e implementé modelos de dominio y lógica de negocio en múltiples microservicios usando <strong>Python y Java</strong>, aplicando principios de <strong>DDD</strong> para soportar servicios bancarios escalables para microcréditos y cuentas de bajo monto.
about.experience3.bullet3=<strong>Servicios backend cloud-native:</strong> Desarrollé y desplegué servicios backend RESTful dentro de entornos <strong>AWS, Azure y GCP</strong>, integrando patrones API Gateway, bases de datos SQL y NoSQL, y pipelines CI/CD para soportar transacciones financieras y sistemas de reportería de alto volumen.
