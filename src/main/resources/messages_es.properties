about.experience2.summary=Desarrollé soluciones de modernización backend y de base de datos para el Ministerio de Transporte de Colombia, usando Java, Jakarta EE e infraestructura Oracle on-premises.
about.experience2.bullet1=<strong>Migración de Java 8 a Java 21:</strong> Migré el <strong>módulo de pagos de comparendos de Java 8 a Java 21</strong> y desarrollé documentación técnica y una nueva API REST para soportar futuros módulos de procesamiento de pagos.
about.experience2.bullet2=<strong>Mejora de rendimiento:</strong> Mejoré el rendimiento de consultas en Oracle 13c <strong>en 40%</strong> dentro de módulos de pagos y reportería, y estandaricé la conectividad a base de datos mediante un módulo compartido.
about.experience2.bullet3=<strong>Nuevo panel administrativo en React:</strong> Desarrollé el frontend en React para gestión de usuarios y consulta/pago de comparendos, <strong>implementando manejo de sesión, caché, integración con Redis, cifrado y autenticación segura</strong>
