about.experience4.summary=Lideré un programa estratégico de tecnología y cumplimiento que permitió a Banco Unión obtener la licencia oficial de operación bancaria y desplegar una nueva plataforma Core Banking, modernizando el ecosistema de integración y datos de la organización.
about.experience4.bullet1=<strong>Arquitectura de integración para core bancario:</strong> Diseñé e implementé la columna vertebral de comunicación entre aplicaciones construyendo un <strong>API Gateway y una capa de mediación</strong> con <strong>más de 94 servicios REST y SOAP</strong>, además de una API de traducción para integrar sistemas bancarios legados con plataformas modernas.
about.experience4.bullet2=<strong>Modernización de datos empresariales:</strong> Catalogué y estandaricé <strong>más de 130 ETL y pipelines de reportería</strong>, y contribuí a su migración hacia plataformas modernas como <strong>AWS Glue, Azure Data Factory y GoAnywhere</strong>.
about.experience4.bullet3=<strong>Alistamiento regulatorio y operativo:</strong> Elaboré estándares técnicos, manuales operativos y documentación de integración requeridos para cumplir <strong>exigencias regulatorias y de auditoría bancaria</strong>, apoyando el despliegue exitoso del nuevo ecosistema Core Banking de la institución.
about.experience5.role=Analista desarrollador y líder de migración FLEXCUBE
about.experience5.chip1=Oracle FLEXCUBE
about.experience5.chip2=Migración de core bancario
